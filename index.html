<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAN OFFICIAL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
}#loading{ position:fixed; width:100%;height:100%; background:#020617; display:flex; justify-content:center; align-items:center; z-index:9999; } .loader{ border:4px solid #1e293b; border-top:4px solid #38bdf8; border-radius:50%; width:45px;height:45px; animation:spin 1s linear infinite; } @keyframes spin{100%{transform:rotate(360deg);}}

.hero{height:200px;}

header{ position:relative; text-align:center; margin-top:-80px; font-size:20px; font-weight:bold; backdrop-filter:blur(10px); }

.menu-btn{ position:absolute; right:15px; top:10px; font-size:22px; cursor:pointer; }

.tabs{ display:flex; justify-content:center; gap:10px; margin:10px 0; } .tab{ padding:8px 10px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; background:#1e293b; color:white; } .active{ background:linear-gradient(90deg,#38bdf8,#6366f1); }

.container{padding:15px;}

.card{ background:rgba(255,255,255,0.05); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1); border-radius:15px; padding:15px; margin-bottom:15px; opacity:0; transform:translateY(30px) scale(0.95); animation:masuk 0.5s ease forwards; } @keyframes masuk{to{opacity:1;transform:translateY(0) scale(1);}}

.card:hover{ transform:translateY(-5px) scale(1.02); box-shadow:0 0 20px rgba(56,189,248,0.3); }

.price{color:#facc15;font-weight:bold;} .available{color:#22c55e;} .sold{color:#ef4444;}

button{ margin-top:10px; padding:10px; width:100%; border:none; border-radius:10px; cursor:pointer; font-weight:bold; transition:0.2s; }

.buy{background:linear-gradient(90deg,#38bdf8,#6366f1);color:white;} .buy:hover{transform:scale(1.05);} button:active{transform:scale(0.9);} .disabled{background:#444;}

.popup,.qrpopup,.adminpopup,.menuPopup{ position:fixed; top:0;left:0; width:100%;height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; }

.box{ background:#020617; padding:20px; border-radius:15px; text-align:center; width:90%;max-width:320px; }

.history{ margin:15px; background:rgba(255,255,255,0.05); padding:12px; border-radius:15px; }

img{width:100%;max-width:250px;border-radius:10px;}

.cs-btn{ position:fixed; bottom:20px; right:20px; width:55px;height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:linear-gradient(90deg,#38bdf8,#6366f1); font-size:22px; cursor:pointer; box-shadow:0 0 15px rgba(56,189,248,0.8); }

.rarity{ font-size:12px; font-weight:bold; margin-bottom:5px; } .basic{color:#22c55e;} .rare{color:#38bdf8;} .epic{color:#a855f7;} .partner{color:#f97316;}

input,select{ width:90%;padding:10px;margin:5px 0;border-radius:8px;border:none; } </style>

</head>
<body><div id="loading"><div class="loader"></div></div><div class="hero"><canvas id="blackhole"></canvas></div><header>
✨ SHOP <span id="akunBtn" style="cursor:pointer;">AKUN</span> FF ID UNIK✨
<div class="menu-btn" onclick="openMenu()">⋮</div>
</header><div class="tabs">
<button class="tab active" onclick="setFilter('ALL',this)">ALL</button>
<button class="tab" onclick="setFilter('BASIC',this)">BASIC</button>
<button class="tab" onclick="setFilter('RARE',this)">RARE</button>
<button class="tab" onclick="setFilter('EPIC',this)">EPIC</button>
<button class="tab" onclick="setFilter('PARTNER',this)">PARTNER</button>
</div><div class="container" id="list"></div><div class="history">
<h3>🧾 Riwayat Buy</h3>
<div id="history"></div>
</div><div class="popup" id="menu"><div class="box">
<h3>Menu</h3>
<button onclick="cs()">Customer Service</button>
<button onclick="waChannel()">📢 Saluran WA</button>
<button onclick="tutupMenu()">Tutup</button>
</div></div><div class="popup" id="popup"><div class="box">
<p id="text"></p>
<button class="buy" onclick="lanjut()">Iya</button>
<button class="disabled" onclick="tutup()">Batal</button>
</div></div><div class="qrpopup" id="qrpopup"><div class="box">
<p><b>Scan QR untuk bayar</b></p>
<img src="https://raw.githubusercontent.com/zannhengsut642-web/WEBSHOPZAN/main/qris.jpg?v=999">
<p>Kirim bukti ke WhatsApp</p>
<button class="buy" onclick="kirimWAOwner()">Kirim ke WA Saya</button>
<button class="disabled" onclick="tutupQR()">Tutup</button>
</div></div><div class="adminpopup" id="adminpopup"><div class="box">
<h3>ADMIN PANEL</h3>
<input id="adminid" placeholder="ID (toggle sold)">
<button class="buy" onclick="toggleSold()">Toggle SOLD</button>
<hr style="margin:10px 0;opacity:0.2">
<input id="deleteid" placeholder="ID (hapus stock)">
<button class="disabled" onclick="deleteStock()">Hapus Stock</button>
<hr style="margin:10px 0;opacity:0.2">
<h4>Tambah Stock</h4>
<input id="newid" placeholder="ID baru">
<input id="newprice" placeholder="Harga">
<input id="newseller" placeholder="No Seller (62xxxx)">
<select id="newrarity">
  <option value="BASIC">BASIC</option>
  <option value="RARE">RARE</option>
  <option value="EPIC">EPIC</option>
  <option value="PARTNER">PARTNER</option>
</select>
<button class="buy" onclick="addStock()">Tambah</button>
<button class="disabled" onclick="closeAdmin()">Tutup</button>
</div></div><div class="cs-btn" onclick="cs()"><i class="fas fa-headset"></i></div><script>
let nomorWA="6282326978091";
let selectedID="";
let selectedSeller="";
let filter="ALL";
let adminPass="1234";

let data = JSON.parse(localStorage.getItem("stock")) || [
  {id:"15224444492",harga:20000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15224222225",harga:22000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15211111249",harga:20000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15215500023",harga:15000,sold:true,rarity:"RARE",type:"RARE"},
  {id:"15222829998",harga:10000,sold:false,rarity:"BASIC",type:"BASIC"},
  {id:"15211300005",harga:25000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15217900005",harga:20000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15222866665",harga:20000,sold:true,rarity:"EPIC",type:"EPIC"},
  {id:"15458000024",harga:20000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15458000028",harga:20000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15211233888",harga:10000,sold:false,rarity:"BASIC",type:"BASIC"},
  {id:"15211221777",harga:10000,sold:false,rarity:"BASIC",type:"BASIC"},
  {id:"15218833001",harga:15000,sold:false,rarity:"RARE",type:"RARE"},
  {id:"15212005400",harga:15000,sold:false,rarity:"RARE",type:"RARE"},
  {id:"15219255551",harga:9000,sold:false,rarity:"RARE",type:"RARE"},
  {id:"15220330001",harga:15000,sold:false,rarity:"RARE",type:"RARE"},
  {id:"15243111111",harga:20000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15522277770",harga:27000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15522277777",harga:30000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"15522244445",harga:27000,sold:false,rarity:"EPIC",type:"EPIC"},
  {id:"PARTNER001",harga:18000,sold:false,rarity:"RARE",type:"PARTNER",seller:"628999111222"}
];

function save(){
  localStorage.setItem("stock", JSON.stringify(data));
}

function setFilter(t,e){filter=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(e)e.classList.add('active');render();}

function render(){
let html="";
data.filter(i=>filter==='ALL'||i.type===filter).forEach((item)=>{
html+=`<div class='card'>
<div class='rarity ${item.type.toLowerCase()}'>${item.type}</div>
<b>${item.id}</b><br>
${item.seller?"<small>No seller: "+item.seller+"</small><br>":""}
<div class='price'>Rp ${item.harga.toLocaleString()}</div>
<div class='${item.sold?'sold':'available'}'>${item.sold?'SOLD':'AVAILABLE'}</div>
<button ${item.sold?'disabled class="disabled"':''} onclick="beli('${item.id}')">
${item.sold?'SOLD':'Beli'}
</button>
</div>`;
});
document.getElementById('list').innerHTML=html;
}

function beli(id){
let item=data.find(x=>x.id===id);

// FIX SOLD: jangan bisa dibeli
if(!item){
  return;
}

if(item.sold){
  alert("❌ ITEM SUDAH SOLD");
  return;
}

selectedID=id;
selectedSeller=item?.seller||nomorWA;
document.getElementById('popup').style.display='flex';
document.getElementById('text').innerText="Beli ID "+id+" ?";
}

function lanjut(){
  document.getElementById("popup").style.display="none";
  document.getElementById("qrpopup").style.display="flex";
}

function tutup(){
  document.getElementById("popup").style.display="none";
  document.getElementById("qrpopup").style.display="none";
  selectedID="";
  selectedSeller="";
}

function tutupQR(){
  document.getElementById("qrpopup").style.display="none";
}

function kirimWAOwner(){
  let pesan="Pembelian ID: "+selectedID+"\nSeller: "+selectedSeller;
  window.open("https://wa.me/"+nomorWA+"?text="+encodeURIComponent(pesan));
}

function cs(){window.open("https://wa.me/"+nomorWA);}
function waChannel(){window.open("https://whatsapp.com/channel/0029VbAJl34F1YlVzBgrPM2E");}
function openMenu(){document.getElementById('menu').style.display='flex';}
function tutupMenu(){document.getElementById('menu').style.display='none';}

function openAdmin(){let p=prompt('Password admin');if(p===adminPass){document.getElementById('adminpopup').style.display='flex';}else alert('SALAH');}
function closeAdmin(){document.getElementById('adminpopup').style.display='none';}

function toggleSold(){
let id=document.getElementById('adminid').value;
let item=data.find(x=>x.id===id);
if(item){
item.sold=!item.sold;
save();
render();
}
}

function addStock(){
let id=document.getElementById('newid').value;
let harga=parseInt(document.getElementById('newprice').value);
let seller=document.getElementById('newseller').value;
let rarity=document.getElementById('newrarity').value;

if(!id||!harga)return;

data.push({
id,harga,
sold:false,
rarity,
type:rarity,
seller
});

save();
render();
}

function deleteStock(){
let id=document.getElementById('deleteid').value;
let i=data.findIndex(x=>x.id===id);
if(i!=-1){
data.splice(i,1);
save();
render();
}
}

let holdTimer;
function initHold(){
const akun=document.getElementById('akunBtn');
akun.addEventListener('mousedown',()=>{holdTimer=setTimeout(()=>openAdmin(),3000);});
akun.addEventListener('mouseup',()=>clearTimeout(holdTimer));
akun.addEventListener('mouseleave',()=>clearTimeout(holdTimer));
akun.addEventListener('touchstart',()=>{holdTimer=setTimeout(()=>openAdmin(),3000);});
akun.addEventListener('touchend',()=>clearTimeout(holdTimer));
}

window.onload=()=>{render();initHold();setTimeout(()=>document.getElementById('loading').style.display='none',1500);}
</script></body></html>
