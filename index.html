<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAN OFFICIAL</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>
/* VIDEO BACKGROUND */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2; /* paling belakang */
}

/* Overlay di atas video biar teks lebih terbaca */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* STOCK CARDS & HEADER */
header, .tabs, .container, .history, .card {
  position: relative;
  z-index: 1; /* di atas video tapi di bawah popup */
}

/* POPUP / QR / ADMIN PANEL */
.popup, .qrpopup, .adminpopup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10; /* pastikan di atas semua */
}

.box{ background:#020617; padding:20px; border-radius:15px; text-align:center; width:90%; max-width:320px; }

.history{ margin:15px; background:rgba(255,255,255,0.05); padding:12px; border-radius:15px; }

img{ width:100%; max-width:250px; border-radius:10px; }

.cs-btn{ position:fixed; bottom:20px; right:20px; width:55px;height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:linear-gradient(90deg,#38bdf8,#6366f1); font-size:22px; cursor:pointer; box-shadow:0 0 15px rgba(56,189,248,0.8); }

.rarity{ font-size:12px; font-weight:bold; margin-bottom:5px; } .basic{color:#22c55e;} .rare{color:#38bdf8;} .epic{color:#a855f7;}

.admin-btn{ position:fixed; bottom:90px; right:20px; width:55px;height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#ef4444; font-size:20px; cursor:pointer; } </style></head>

<!-- BODY -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
✨ SHOP AKUN FF ID UNIK 24 JAM!✨
<div class="menu-btn" onclick="openMenu()">⋮</div>
</header><div class="tabs">
<button class="tab active" onclick="setFilter('ALL',this)">ALL</button>
<button class="tab" onclick="setFilter('BASIC',this)">BASIC</button>
<button class="tab" onclick="setFilter('RARE',this)">RARE</button>
<button class="tab" onclick="setFilter('EPIC',this)">EPIC</button>
</div><div class="container" id="list"></div><div class="history">
<h3>🧾 Riwayat Buy</h3>
<div id="history"></div>
</div><div class="popup" id="menu"><div class="box">
<h3>Menu</h3>
<button onclick="cs()">Customer Service</button>
<button onclick="waChannel()">📢 Saluran WA</button>
<button onclick="tutupMenu()">Tutup</button>
</div></div><div class="popup" id="popup"><div class="box">
<p id="text"></p>
<button class="buy" onclick="lanjut()">Iya</button>
<button class="disabled" onclick="tutup()">Batal</button>
</div></div><div class="qrpopup" id="qrpopup"><div class="box">
<p><b>Scan QR untuk bayar</b></p>
<img src="https://raw.githubusercontent.com/zannhengsut642-web/WEBSHOPZAN/main/qris.jpg?v=999">
<p>Kirim bukti ke WhatsApp</p>
<button class="buy" onclick="kirimWA()">Kirim Bukti</button>
<button class="disabled" onclick="tutupQR()">Tutup</button>
</div></div><!-- ADMIN PANEL --><div class="adminpopup" id="adminpopup"><div class="box">
<h3>ADMIN PANEL</h3>
<input id="adminid" placeholder="Masukkan ID">
<button class="buy" onclick="toggleSold()">Toggle SOLD</button>
<button class="disabled" onclick="closeAdmin()">Tutup</button>
</div></div><div class="cs-btn" onclick="cs()"><i class="fas fa-headset"></i></div>
<script>
let nomorWA="6282326978091";
let selectedID="";
let filter="ALL";
let adminPass="2012";

let data=[
  {id:"15224444492",harga:3000,sold:true,rarity:"EPIC"},
  {id:"15224222225",harga:22000,sold:true,rarity:"EPIC"},
  {id:"15211111249",harga:20000,sold:false,rarity:"EPIC"},
  {id:"15215500023",harga:15000,sold:true,rarity:"RARE"},
  {id:"15222829998",harga:10000,sold:true,rarity:"BASIC"},
  {id:"15211300005",harga:25000,sold:false,rarity:"EPIC"},
  {id:"15217900005",harga:20000,sold:false,rarity:"EPIC"},
  {id:"15222866665",harga:20000,sold:true,rarity:"EPIC"},
  {id:"15458000024",harga:20000,sold:true,rarity:"EPIC"},
  {id:"15458000028",harga:20000,sold:true,rarity:"EPIC"},
  {id:"15211233888",harga:10000,sold:false,rarity:"BASIC"},
  {id:"15211221777",harga:10000,sold:false,rarity:"BASIC"},
  {id:"15218833001",harga:15000,sold:false,rarity:"RARE"},
  {id:"15212005400",harga:15000,sold:false,rarity:"RARE"},
  {id:"15219255551",harga:9000,sold:false,rarity:"RARE"},
  {id:"15220330001",harga:15000,sold:false,rarity:"RARE"},
  {id:"15243111111",harga:20000,sold:true,rarity:"EPIC"},
  {id:"15522277770",harga:27000,sold:false,rarity:"EPIC"},
  {id:"15522277777",harga:30000,sold:true,rarity:"EPIC"},
  {id:"15522244445",harga:27000,sold:true,rarity:"EPIC"},
  {id:"15555557559",harga:30000,sold:true,rarity:"EPIC"},
  {id:"15380000043",harga:32000,sold:false,rarity:"EPIC"},
  {id:"15522221945",harga:27000,sold:false,rarity:"EPIC"},
  {id:"15555553235",harga:30000,sold:false,rarity:"EPIC"},
  {id:"15555553110",harga:30000,sold:false,rarity:"EPIC"},
  {id:"15577885576",harga:15000,sold:false,rarity:"RARE"},
  {id:"15455540000",harga:27000,sold:false,rarity:"EPIC"},

  {id:"15223633335",harga:15000,sold:false,rarity:"RARE"},
  {id:"15555560010",harga:25000,sold:false,rarity:"EPIC"},
  {id:"15555553221",harga:20000,sold:false,rarity:"EPIC"},
  {id:"15533399888",harga:15000,sold:false,rarity:"RARE"},
  {id:"15533336660",harga:25000,sold:false,rarity:"EPIC"},
  {id:"15533333140",harga:20000,sold:false,rarity:"EPIC"}
];

function setFilter(t,e){filter=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(e)e.classList.add('active');render();}

function render(){
let html="";
data.filter(i=>filter==='ALL'||i.rarity===filter).forEach((item,i)=>{
html+=`<div class='card'>
<div class='rarity'>${item.rarity}</div>
<b>${item.id}</b><br>
<div class='price'>Rp ${item.harga.toLocaleString()}</div>
<div class='${item.sold?'sold':'available'}'>${item.sold?'SOLD':'AVAILABLE'}</div>
<button 
${item.sold ? 'disabled class="disabled"' : `onclick="beli('${item.id}')"`}>
${item.sold ? 'SOLD OUT' : 'Beli'}
</button>
</div>`;
});
document.getElementById('list').innerHTML=html;
}

function beli(id){selectedID=id;document.getElementById('popup').style.display='flex';document.getElementById('text').innerText='Beli '+id+' ?';}
function tutup(){document.getElementById('popup').style.display='none';}
function lanjut(){document.getElementById('popup').style.display='none';document.getElementById('qrpopup').style.display='flex';}
function tutupQR(){document.getElementById('qrpopup').style.display='none';}
function kirimWA(){window.open('https://wa.me/'+nomorWA+'?text=Saya+bayar+'+selectedID);}
function cs(){window.open('https://wa.me/'+nomorWA);}
function waChannel(){window.open('https://whatsapp.com/channel/0029VbAJl34F1YlVzBgrPM2E');}
function openMenu(){document.getElementById('menu').style.display='flex';}
function tutupMenu(){document.getElementById('menu').style.display='none';}

function openAdmin(){let p=prompt('Password admin');if(p===adminPass){document.getElementById('adminpopup').style.display='flex';}else alert('SALAH');}
function closeAdmin(){document.getElementById('adminpopup').style.display='none';}

function toggleSold(){
let id=document.getElementById('adminid').value;
let item=data.find(x=>x.id===id);
if(item){item.sold=!item.sold;render();alert('UPDATED');}else alert('ID tidak ditemukan');
}

window.onload=()=>{render();setTimeout(()=>document.getElementById('loading').style.display='none',1500);}
</script></body></html>
