<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAN OFFICIAL</title>

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.loader{
  border:4px solid #1e293b;
  border-top:4px solid #38bdf8;
  border-radius:50%;
  width:45px;height:45px;
  animation:spin 1s linear infinite;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* HERO */
.hero{height:200px;}

/* HEADER */
header{
  position:relative;
  text-align:center;
  margin-top:-80px;
  font-size:20px;
  font-weight:bold;
  backdrop-filter:blur(10px);
}

/* MENU DOT */
.menu-btn{
  position:absolute;
  right:15px;
  top:10px;
  font-size:22px;
  cursor:pointer;
}

/* CARD */
.container{padding:15px;}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;

  opacity:0;
  transform:translateY(30px) scale(0.95);
  animation:masuk 0.5s ease forwards;
}
@keyframes masuk{
  to{opacity:1;transform:translateY(0) scale(1);}
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 20px rgba(56,189,248,0.3);
}

.price{color:#facc15;font-weight:bold;}
.available{color:#22c55e;}
.sold{color:#ef4444;}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.buy{
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
}

.buy:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(56,189,248,0.8);
}

button:active{transform:scale(0.9);}
.disabled{background:#444;}

/* POPUP */
.popup,.qrpopup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}
.box{
  background:#020617;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:90%;
  max-width:320px;
  animation:pop 0.3s ease;
}
@keyframes pop{
  from{transform:scale(0.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* HISTORY */
.history{
  margin:15px;
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:15px;
}

/* IMG */
img{
  width:100%;
  max-width:250px;
  border-radius:10px;
}

/* FLOAT CS BUTTON */
.cs-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  font-size:22px;
  cursor:pointer;
  box-shadow:0 0 15px rgba(56,189,248,0.8);
  animation:floatBtn 2s infinite;
}
@keyframes floatBtn{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div id="loading"><div class="loader"></div></div>

<div class="hero">
  <canvas id="blackhole"></canvas>
</div>

<header>
  ✨ ZAN OFFICIAL ✨
  <div class="menu-btn" onclick="openMenu()">⋮</div>
</header>

<div class="container" id="list"></div>

<div class="history">
  <h3>🧾 Riwayat Buy</h3>
  <div id="history"></div>
</div>

<!-- MENU -->
<div class="popup" id="menu">
  <div class="box">
    <h3>Menu</h3>
    <button onclick="cs()">Customer Service</button>
    <button onclick="tutupMenu()">Tutup</button>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <p id="text"></p>
    <button class="buy" onclick="lanjut()">Iya</button>
    <button class="disabled" onclick="tutup()">Batal</button>
  </div>
</div>

<!-- QR -->
<div class="qrpopup" id="qrpopup">
  <div class="box">
    <p><b>Scan QR untuk bayar</b></p>
    <img src="https://raw.githubusercontent.com/zannhengsut642-web/WEBSHOPZAN/main/qris.jpg?v=999">
    <p style="font-size:13px;color:#aaa;">Kirim bukti ke WhatsApp</p>
    <button class="buy" onclick="kirimWA()">Kirim Bukti</button>
    <button class="disabled" onclick="tutupQR()">Tutup</button>
  </div>
</div>

<!-- FLOAT CS -->
<div class="cs-btn" onclick="cs()">
  <i class="fas fa-headset"></i>
</div>

<script>
let nomorWA="6282326978091";

let data=[
  {id:"15224444492",harga:15000,sold:false},
  {id:"15224222225",harga:35000,sold:false},
  {id:"15211111249",harga:15000,sold:false},
  {id:"15215500023",harga:10000,sold:false},
  {id:"15222829998",harga:30000,sold:false}
];

let selectedID="";

function render(){
  let html="";
  data.forEach((item,i)=>{
    html+=`
    <div class="card" style="animation-delay:${i*0.1}s">
      <div><b>${item.id}</b></div>
      <div class="price">Rp ${item.harga.toLocaleString()}</div>
      <div class="${item.sold?'sold':'available'}">
        ${item.sold?'SOLD':'Available'}
      </div>

      <button 
        class="${item.sold?'disabled':'buy'}"
        ${item.sold?'disabled':''}
        onclick="beli(${i})">
        ${item.sold?'Sold Out':'Beli'}
      </button>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
}

function beli(i){
  selectedID=data[i].id;
  document.getElementById("popup").style.display="flex";
  document.getElementById("text").innerText="Beli ID "+selectedID+" ?";
}

function tutup(){document.getElementById("popup").style.display="none";}
function lanjut(){
  document.getElementById("popup").style.display="none";
  document.getElementById("qrpopup").style.display="flex";
}
function tutupQR(){document.getElementById("qrpopup").style.display="none";}

function kirimWA(){
  let pesan="Halo, saya sudah bayar ID "+selectedID;
  window.open("https://wa.me/"+nomorWA+"?text="+encodeURIComponent(pesan));
}

function cs(){
  window.open("https://wa.me/"+nomorWA);
}

function openMenu(){
  document.getElementById("menu").style.display="flex";
}
function tutupMenu(){
  document.getElementById("menu").style.display="none";
}

/* BLACK HOLE */
const canvas=document.getElementById("blackhole");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=200;

let t=0;
function draw(){
  ctx.fillStyle="rgba(2,6,23,0.6)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let cx=canvas.width/2;
  let cy=canvas.height/2;

  let g=ctx.createRadialGradient(cx,cy,5,cx,cy,70);
  g.addColorStop(0,"black");
  g.addColorStop(1,"transparent");
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(cx,cy,70,0,Math.PI*2);
  ctx.fill();

  for(let i=0;i<180;i++){
    let angle=i*0.1+t*2;
    let radius=55+Math.sin(i+t)*15;

    let x=cx+Math.cos(angle)*radius;
    let y=cy+Math.sin(angle)*radius;

    ctx.beginPath();
    ctx.arc(x,y,2.2,0,Math.PI*2);
    ctx.fillStyle="rgba(56,189,248,1)";
    ctx.fill();
  }

  let glow=ctx.createRadialGradient(cx,cy,50,cx,cy,130);
  glow.addColorStop(0,"rgba(56,189,248,0.5)");
  glow.addColorStop(1,"transparent");
  ctx.fillStyle=glow;
  ctx.beginPath();
  ctx.arc(cx,cy,130,0,Math.PI*2);
  ctx.fill();

  ctx.font="bold 26px Segoe UI";
  ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.shadowColor="#38bdf8";
  ctx.shadowBlur=25;
  ctx.fillText("ZAN OFFICIAL",cx,cy+5);

  t+=0.05;
  requestAnimationFrame(draw);
}
draw();

window.onload=()=>{
  document.getElementById("loading").style.display="none";
}

render();
</script>

</body>
</html>
